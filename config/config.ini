# OCR Configuration
# This configuration file is used for the AI OCR project

[ocr]
# Languages for OCR recognition (Thai + English)
languages = tha+eng

# DPI for image rendering (higher = better quality, slower)
# Lowered to 150 for memory efficiency on 32-bit Python
dpi = 150

# Page processing timeout (seconds)
timeout = 120

[output]
# Output formats
save_txt = true
save_md = true

# Output directories
txt_output_dir = output_txt
md_output_dir = output_md

[processing]
# Number of largest files to process first
process_top_files = 3

# Batch size for processing
batch_size = 1

# Show progress bar
show_progress = true

# Supported input formats
# PDF: .pdf
# Images: .jpg, .jpeg, .png, .bmp, .tiff, .tif, .gif
